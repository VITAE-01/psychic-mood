events {}

http {
    # Redirect all HTTP traffic to HTTPS
    server {
        listen 80;
        server_name psychic-study.app www.psychic-study.app;
        return 301 https://$host$request_uri;
    }

    # Main HTTPS server
    server {
        listen 443 ssl;
        server_name psychic-study.app www.psychic-study.app;

        ssl_certificate /etc/letsencrypt/live/psychic-study.app/fullchain.pem;# managed by Certbot
        ssl_certificate_key /etc/letsencrypt/live/psychic-study.app/privkey.pem;# managed by Certbot
        include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

        # Serve static files
        location /static/ {
            alias /static/;
        }

        # Proxy pass to Django app running in Docker
        location / {
            proxy_pass http://web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}