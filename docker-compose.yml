version: "3.9"

services:

  web:
    image: ghcr.io/Hardarmyyy/mood-app:latest
    container_name: mood_app
    restart: always
    volumes:
      - static_volume:/app/frontend/staticfiles
      - ./psychic_data:/app/frontend/data
    expose:
      - "8000"
    env_file:
      - .env
    networks:
      - psychic

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_volume:/static
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web
    networks:
      - psychic

volumes:
  static_volume: {}
  psychic_data: {}

networks:
  psychic:
    driver: bridge