version: "3.9"

services:

  web:
    build: .
    container_name: mood_app
    restart: always
    volumes:
      - static_volume:/static
      - ./psychic_data:/app/frontend/data
    expose:
      - "8000"
    env_file:
      - .env

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - static_volume:/static
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web

volumes:
  static_volume:
  psychic_data: {}