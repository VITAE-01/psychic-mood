{% extends "account/base.html" %}

{% block content %}

<h2>Register</h2>

<form method="POST">
    {% csrf_token %}

    {{ form.as_p }}

    <input type="checkbox" name="consent" required>
    <label for="consent">I agree to participate and allow my data to be used for research purposes.</label>

    <div>
        <button type="submit">Sign Up</button>
    </div>

</form>

<p>Already have an account?
<a href="{% url 'account:login' %}">Login here</a>
</p>

{% endblock %}
