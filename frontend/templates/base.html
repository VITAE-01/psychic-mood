<!DOCTYPE html>
<html>
<head>
    <title>Psychic Mood</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<style>

.page-title {
    color: #0d6efd;
    padding: 20px 0;
    padding-left: 10px;
    font-weight: 700;
}

body{
background:#f8fafc;
}

form input:not([type="checkbox"]), form select{
height:40px;
width: 100%;
border-radius:8px;
padding-left: 12px;
padding-right: 12px;
}

.btn-primary{
background:#3B82F6;
border:none;
border-radius:10px;
}

a.text-primary {
    text-decoration: none;
}

input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

input[type="number"] {
    -moz-appearance: textfield;
}

/* a.text-primary:hover {
    text-decoration: underline;
} */

.errorlist {
    list-style: none;
    padding-left: 0;
    margin: 4px 0 0 0;
}

.errorlist li {
    color: #dc3545;
    font-size: 0.85rem;
    margin: 0;
    padding: 0;
}


</style>
<body>

<h1 class="page-title">Psychic Mood</h1>

{% block content %}
{% endblock %}

</body>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const numberFields = document.querySelectorAll('input[type="number"][min="0"]');

        numberFields.forEach(field => {
            field.addEventListener("input", function () {
                if (this.value < 0) {
                    this.value = 1;
                }
            });
        });
    });
</script>
</html>
